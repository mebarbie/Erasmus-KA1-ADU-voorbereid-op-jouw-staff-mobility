<!--
  ============================================================
  Erasmus+ KA1 ADU – interactieve webcursus
  Voor publicatie op GitHub Pages of Netlify
  ============================================================

  HOE PUBLICEREN (Netlify)
  1. Sla dit bestand op als index.html en push het naar je GitHub-repo
  2. Ga naar netlify.com -> Add new site -> Import from GitHub
  3. Kies je repo. Build command leeg laten, publish directory = root (/)
  4. Deploy. Je cursus staat dan op een netlify.app-adres
  5. Elke nieuwe push naar GitHub deployt automatisch opnieuw

  ============================================================
  SUPABASE INSTELLEN (login + voortgang + leerkracht-dashboard)
  ============================================================
  Je gebruikt je BESTAANDE Supabase-project. De tabel heet ka1_voortgang
  zodat ze niet botst met andere tabellen.

  STAP A — Config invullen (hieronder in SUPABASE):
    - SUPABASE.URL      = Project URL (Supabase -> Project Settings -> API)
    - SUPABASE.ANON_KEY = anon public key (zelfde pagina). Deze hoort
      publiek te zijn; de echte beveiliging zit in RLS (stap C).
    - LEERKRACHT_EMAILS = lijst met e-mailadressen die ALLES mogen zien

  STAP B — Magic link aanzetten:
    Supabase -> Authentication -> Providers -> Email: "Enable Email" aan,
    en "Confirm email" mag aan blijven. Onder URL Configuration zet je je
    site-URL (je netlify.app-adres) bij "Site URL" en bij "Redirect URLs".

  STAP C — Database + beveiliging. Plak dit in Supabase -> SQL Editor -> Run:

    create table if not exists ka1_voortgang (
      user_id uuid references auth.users(id) on delete cascade,
      email text,
      naam text,
      cvo text,
      answers jsonb default '{}'::jsonb,
      completed jsonb default '{}'::jsonb,
      fiche_ingediend timestamptz,
      updated_at timestamptz default now(),
      primary key (user_id)
    );

    alter table ka1_voortgang enable row level security;

    -- Cursist mag enkel eigen rij lezen/schrijven
    create policy "eigen rij select" on ka1_voortgang
      for select using (auth.uid() = user_id);
    create policy "eigen rij upsert" on ka1_voortgang
      for insert with check (auth.uid() = user_id);
    create policy "eigen rij update" on ka1_voortgang
      for update using (auth.uid() = user_id);

    -- Leerkrachten mogen alles lezen (vul je eigen e-mailadres(sen) in)
    create policy "leerkracht select alles" on ka1_voortgang
      for select using (
        (auth.jwt() ->> 'email') in ('jouw.naam@kov.be')
      );

  LET OP: vervang 'jouw.naam@kov.be' in de SQL door dezelfde adressen
  als in LEERKRACHT_EMAILS hieronder. Beide moeten kloppen.
-->

<p>Volwasseneneducatie staat midden in maatschappelijke veranderingen. CVO's werken met diverse cursisten, uiteenlopende leervragen en veranderende verwachtingen vanuit samenleving en arbeidsmarkt. Erasmus+ helpt CVO's om internationaal te leren rond vragen zoals: hoe begeleiden andere landen volwassen lerenden, hoe organiseren ze trajectbegeleiding en basisvaardigheden, hoe spelen ze in op arbeidsmarktnoden, hoe combineren ze taalverwerving met beroepsopleiding, hoe gebruiken ze AI en blended learning, hoe meten ze kwaliteit en impact, en hoe maken ze duurzaamheid concreet.</p>
<p>Voor volwasseneneducatie is Erasmus+ zo een hefboom voor professionalisering, internationale oriëntatie, curriculuminnovatie, inclusieve didactiek, digitale transformatie, kwaliteitsontwikkeling, samenwerking tussen CVO's en duurzame implementatie van vernieuwing. Een mobiliteit is waardevol wanneer de deelnemer niet alleen terugkomt met inspiratie, maar met inzichten die vertaald kunnen worden naar de eigen praktijk.</p>
<p><strong>Praktijkvoorbeeld.</strong> Een leerkracht NT2 gaat op jobshadowing bij een centrum in Zweden dat taalonderwijs combineert met arbeidsmarktgerichte trajecten. De deelnemer observeert hoe cursisten gescreend worden, hoe taal en beroep geïntegreerd worden, hoe begeleiders en lesgevers samenwerken en hoe het centrum contact houdt met werkgevers. Na terugkeer deelt de deelnemer de inzichten met het team en formuleert samen één verbeteridee voor het eigen CVO.</p>
[[MEDIA:img1_2|Afbeelding 1.2 — Brug tussen internationale praktijk en CVO-praktijk|Schema dat toont hoe een deelnemer inzichten uit een buitenlandse praktijk vertaalt naar het eigen CVO]]`,

/* ============================================================
   MEDIA RENDERING
   ============================================================ */
function mediaTagClass(kind){ return kind==="audio"?"audio":(kind==="image"?"image":""); }

function renderMediaPlaceholder(code, label, desc) {
  // Nette placeholder als er (nog) geen bron is ingevuld
  let kind = "video";
  if (code.startsWith("a")) kind = "audio";
  if (code.startsWith("img")) kind = "image";
  return `<div class="media"><span class="tag ${mediaTagClass(kind)}">${label}</span>`
    + (desc?`<p>${desc}</p>`:"") + `</div>`;
}

function renderMedia(code, label, desc) {
  const m = MEDIA[code];
  const src = m && m.src ? String(m.src).trim() : "";
  if (!src) return renderMediaPlaceholder(code, label, desc);

  // Type bepalen: expliciet opgegeven, anders raden
  let type = m.type;
  if (!type) {
    if (/\.(mp3|wav|ogg|m4a)$/i.test(src)) type = "audio";
    else if (/\.(png|jpe?g|gif|webp|svg)$/i.test(src)) type = "image";
    else if (code.startsWith("a")) type = "audio";
    else if (code.startsWith("img")) type = "image";
    else type = "youtube";
  }

  const titleAttr = label.replace(/"/g,"");
  if (type === "youtube") {
    return `<div class="media"><div class="video-embed"><iframe src="https://www.youtube.com/embed/${encodeURIComponent(src)}" allowfullscreen title="${titleAttr}"></iframe></div></div>`;
  }
  if (type === "vimeo") {
    return `<div class="media"><div class="video-embed"><iframe src="https://player.vimeo.com/video/${encodeURIComponent(src)}" allowfullscreen title="${titleAttr}"></iframe></div></div>`;
  }
  if (type === "audio") {
    return `<div class="media"><h4>${label}</h4><audio controls preload="none" style="width:100%;margin-top:8px;"><source src="${src}">Je browser ondersteunt geen audio. <a href="${src}">Download het bestand</a>.</audio></div>`;
  }
  if (type === "image") {
    const alt = desc ? desc.replace(/"/g,"") : titleAttr;
    return `<div class="media"><img src="${src}" alt="${alt}" style="width:100%;border-radius:10px;display:block;"></div>`;
  }
  return renderMediaPlaceholder(code, label, desc);
}

function expandMedia(html) {
  // Vervangt [[MEDIA:code|label|beschrijving]] door echte media of placeholder
  return html.replace(/\[\[MEDIA:([^\|\]]+)\|([^\|\]]*)\|([^\]]*)\]\]/g,
    (_, code, label, desc) => renderMedia(code.trim(), label.trim(), desc.trim()));
}

/* ============================================================
   SUPABASE: client, auth, opslag
   ============================================================ */
let sb = null;
let currentUser = null;
let saveTimer = null;
const SUPA_ON = !!(SUPABASE.URL && SUPABASE.ANON_KEY);

function isLeerkracht() {
  return currentUser && LEERKRACHT_EMAILS
    .map(e => e.toLowerCase())
    .includes((currentUser.email || "").toLowerCase());
}

function initSupabase() {
  if (!SUPA_ON) return;
  sb = window.supabase.createClient(SUPABASE.URL, SUPABASE.ANON_KEY);
}

async function checkSession() {
  if (!SUPA_ON) return null;
  const { data } = await sb.auth.getSession();
  return data.session ? data.session.user : null;
}

async function sendMagicLink(email) {
  const redirect = window.location.href.split("#")[0];
  return await sb.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: redirect }
  });
}

async function signOut() {
  if (sb) await sb.auth.signOut();
  currentUser = null;
  location.reload();
}

async function loadFromDb() {
  if (!SUPA_ON || !currentUser) return;
  const { data, error } = await sb.from("ka1_voortgang")
    .select("answers, completed").eq("user_id", currentUser.id).maybeSingle();
  if (!error && data) {
    answers = data.answers || {};
    completed = data.completed || {};
  }
}

async function saveToDb() {
  if (!SUPA_ON || !currentUser) return;
  const row = {
    user_id: currentUser.id,
    email: currentUser.email,
    naam: answers["f_naam"] || answers["f_naam"] || null,
    cvo: answers["f_cvo"] || null,
    answers, completed,
    updated_at: new Date().toISOString()
  };
  await sb.from("ka1_voortgang").upsert(row, { onConflict: "user_id" });
}

function scheduleDbSave() {
  if (!SUPA_ON || !currentUser) return;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToDb, 1200); // debounce
}

async function renderDashboard() {

    </tr>`;
  }).join("");
  if (!rows) rows = `<tr><td colspan="6">Nog geen ingezonden voortgang.</td></tr>`;

    <div class="card">
      <h2 style="color:var(--kov-blue);margin-top:0;">Leerkracht-dashboard</h2>
      <p>Overzicht van alle deelnemers. Klik op een naam in een latere versie voor detail; nu zie je voortgang en of de mobiliteitsfiche is ingediend.</p>
      <table>
        <thead><tr><th>Naam</th><th>CVO</th><th>E-mail</th><th>Verplichte modules</th><th>Fiche</th><th>Laatst actief</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="btn-row"><button class="btn secondary" onclick="exportDashboardCsv()">Exporteer als CSV</button></div>
    </div>`;

function exportDashboardCsv() {
  const verplicht = COURSE.filter(m=>!m.optional);
  const header = ["naam","cvo","email","verplichte_modules_klaar","totaal_verplicht","fiche_ingediend","laatst_actief"];
  const lines = [header.join(";")];
  (window._dashData||[]).forEach(r => {
    const c = r.completed || {};
    const done = verplicht.filter(m=>c[m.id]).length;
    const fiche = r.answers && r.answers["f_naam"] && c["m5"] ? "ja" : "nee";
    lines.push([
      (r.naam||r.answers?.f_naam||""), (r.cvo||r.answers?.f_cvo||""), (r.email||""),
      done, verplicht.length, fiche, r.updated_at||""
    ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(";"));
  });
  const blob = new Blob([lines.join("\n")], {type:"text/csv"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "ka1_voortgang.csv"; a.click();
}

   STATE
   ============================================================ */
let answers = {};
let completed = {};
let current = "m0";

function load() {
  try {
    const raw = localStorage.getItem(PARTICIPANT_KEY);
    if (raw) { const d = JSON.parse(raw); answers = d.answers || {}; completed = d.completed || {}; }
  } catch(e) {}
}
function persist() {
  try { localStorage.setItem(PARTICIPANT_KEY, JSON.stringify({answers, completed})); } catch(e) {}
  scheduleDbSave();
  updateProgress();
}

/* ============================================================
   RENDER
   ============================================================ */
function renderNav() {
  const nav = document.getElementById("navItems");
  nav.innerHTML = "";
  COURSE.forEach(m => {
    const b = document.createElement("button");
    b.className = (m.id === current ? "active" : "");
    b.onclick = () => { current = m.id; renderModule(); renderNav(); window.scrollTo({top:0,behavior:"smooth"}); };
    const label = document.createElement("span");
    label.textContent = m.title.replace(/ — .*/, "");
    b.appendChild(label);
    if (m.optional) { const o = document.createElement("span"); o.className="mod-optional"; o.textContent="optioneel"; b.appendChild(o); }
    if (completed[m.id]) { const s = document.createElement("span"); s.className="mod-status"; s.textContent="✓"; b.appendChild(s); }
    nav.appendChild(b);
  });
}

function field(it) {
  const v = answers[it.id] || "";
  if (it.input === "textarea")
    return `<textarea rows="3" data-id="${it.id}">${escapeHtml(v)}</textarea>`;
  if (it.input === "select") {
    const opts = ["<option value=''>— kies —</option>"].concat(it.choices.map(c=>`<option ${v===c?"selected":""}>${c}</option>`)).join("");
    return `<select data-id="${it.id}">${opts}</select>`;
  }
  return `<input type="text" data-id="${it.id}" value="${escapeHtml(v)}" />`;
}

function renderItem(it) {
  if (it.type === "open") {
    return `<div class="open-q"><div class="q">${it.q}</div><textarea rows="4" data-id="${it.id}">${escapeHtml(answers[it.id]||"")}</textarea></div>`;
  }
  if (it.type === "field") {
    return `<div class="field"><label>${it.label}${it.hint?` <span class="hint">(${it.hint})</span>`:""}</label>${field(it)}</div>`;
  }
  if (it.type === "submit") {
    return `<div class="btn-row"><button class="btn" data-submit="1">${it.label}</button></div><div class="save-status" id="submitStatus"></div>`;
  }
  if (it.type === "mc" || it.type === "tf") {
    const opts = it.type === "tf" ? ["Juist","Fout"] : it.options;
    const saved = answers[it.id];
    const optHtml = opts.map((o,i)=>`<label><input type="radio" name="${it.id}" value="${i}" ${saved!==undefined&&Number(saved)===i?"checked":""}> ${o}</label>`).join("");
    return `<div class="quiz-item"><div class="q">${it.q}</div><div class="options" data-quiz="${it.id}" data-type="${it.type}">${optHtml}</div><div class="feedback" id="fb_${it.id}"></div></div>`;
  }
  if (it.type === "multi") {
    const saved = answers[it.id] || [];
    const optHtml = it.options.map((o,i)=>`<label><input type="checkbox" data-multi="${it.id}" value="${i}" ${saved.includes(i)?"checked":""}> ${o}</label>`).join("");
    return `<div class="quiz-item"><div class="q">${it.q}</div><div class="options">${optHtml}</div></div>`;
  }
  return "";
}

function renderModule() {
  const m = COURSE.find(x=>x.id===current);
  const main = document.getElementById("main");
  let html = `<div class="card"><div class="module-head"><h2>${m.title}</h2><span class="richttijd">${m.time}${m.optional?" · optioneel":""}</span></div></div>`;
  m.pages.forEach(p => {
    html += `<div class="card"><h3 class="page-title">${p.title}</h3>`;
    if (p.goal) html += `<div class="leerdoel"><strong>Leerdoel:</strong> ${p.goal}</div>`;
    html += expandMedia(p.html);
    if (p.items && p.items.length) {
      html += `<div class="quiz">`;
      p.items.forEach(it => html += renderItem(it));
      html += `</div>`;
    }
    html += `</div>`;
  });
  html += `<div class="card"><div class="complete-toggle"><input type="checkbox" id="modDone" ${completed[m.id]?"checked":""}><label for="modDone">Ik heb deze module doorgenomen</label></div>`;
  html += `<div class="nav-buttons">`;
  const idx = COURSE.findIndex(x=>x.id===current);
  html += idx>0 ? `<button class="btn secondary" data-go="${COURSE[idx-1].id}">← Vorige</button>` : `<span></span>`;
  html += idx<COURSE.length-1 ? `<button class="btn" data-go="${COURSE[idx+1].id}">Volgende →</button>` : `<span></span>`;
  html += `</div></div>`;
  main.innerHTML = html;
  attachHandlers();
}

function attachHandlers() {
  document.querySelectorAll("[data-id]").forEach(el => {
    el.addEventListener("input", () => { answers[el.dataset.id] = el.value; persist(); });
    el.addEventListener("change", () => { answers[el.dataset.id] = el.value; persist(); });
  });
  document.querySelectorAll("[data-quiz]").forEach(grp => {
    const id = grp.dataset.quiz;
    grp.querySelectorAll("input").forEach(inp => {
      inp.addEventListener("change", () => {
        answers[id] = inp.value; persist();
        showFeedback(id);
      });
    });
    if (answers[id]!==undefined) showFeedback(id);
  });
  document.querySelectorAll("[data-multi]").forEach(inp => {
    inp.addEventListener("change", () => {
      const id = inp.dataset.multi;
      const vals = Array.from(document.querySelectorAll(`[data-multi="${id}"]:checked`)).map(x=>Number(x.value));
      answers[id] = vals; persist();
    });
  });
  document.querySelectorAll("[data-go]").forEach(b => b.onclick = () => { current = b.dataset.go; renderModule(); renderNav(); window.scrollTo({top:0,behavior:"smooth"}); });
  const done = document.getElementById("modDone");
  if (done) done.onclick = () => { completed[current] = done.checked; persist(); renderNav(); };
  const sub = document.querySelector("[data-submit]");
  if (sub) sub.onclick = submitFiche;
}

function showFeedback(id) {
  const it = findItem(id);
  if (!it || it.correct === undefined) return;
  const fb = document.getElementById("fb_"+id);
  if (!fb) return;
  const chosen = Number(answers[id]);
  if (it.correct === null) { // open keuze, geen fout
    fb.className = "feedback show ok"; fb.textContent = it.fb; return;
  }
  const correctIdx = it.type === "tf" ? (it.correct ? 0 : 1) : it.correct;
  if (chosen === correctIdx) { fb.className = "feedback show ok"; fb.textContent = "Juist. " + it.fb; }
  else { fb.className = "feedback show err"; fb.textContent = "Nog niet. " + it.fb + " Probeer opnieuw."; }
}

function findItem(id) {
  for (const m of COURSE) for (const p of m.pages) if (p.items) for (const it of p.items) if (it.id===id) return it;
  return null;
}

/* ============================================================
   PROGRESS
   ============================================================ */
function updateProgress() {
  const total = COURSE.filter(m=>!m.optional).length;
  const done = COURSE.filter(m=>!m.optional && completed[m.id]).length;
  document.getElementById("progressBar").style.width = Math.round(done/total*100)+"%";
}

/* ============================================================
   SUBMIT MOBILITEITSFICHE
   ============================================================ */
async function submitFiche() {
  const status = document.getElementById("submitStatus");
  const naam = answers["f_naam"];
  if (!naam) { status.textContent = "Vul minstens je naam in voor je indient."; return; }
  status.textContent = "Bezig met indienen…";
  completed["m5"] = true;

  let centraalOk = false;
  if (SUPA_ON && currentUser) {
    try {
      const { error } = await sb.from("ka1_voortgang").upsert({
        user_id: currentUser.id,
        email: currentUser.email,
        naam: naam,
        cvo: answers["f_cvo"] || null,
        answers, completed,
        fiche_ingediend: new Date().toISOString(),
        updated_at: new Date().toISOString()
      }, { onConflict: "user_id" });
      centraalOk = !error;
    } catch(e) { centraalOk = false; }
  }
  persist();
  renderNav();

  const payload = { type:"ka1_mobiliteitsfiche", ingediend_op:new Date().toISOString(), naam, cvo: answers["f_cvo"]||"", antwoorden: answers };
  downloadJson(payload, `mobiliteitsfiche_${slug(naam)}.json`);

  status.innerHTML = centraalOk
    ? "Je fiche is ingediend en bewaard in de databank. Je consortiumcoördinator kan ze nu zien. Er is ook een back-up gedownload."
    : "Je fiche is gedownload als bestand. Bezorg dit aan je consortiumcoördinator (databank is niet geconfigureerd of je bent niet aangemeld).";
}

function downloadJson(obj, name) {
  const blob = new Blob([JSON.stringify(obj,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name; a.click();
}

/* ============================================================
   HELPERS
   ============================================================ */
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c])); }
function slug(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,""); }

/* ============================================================
   INIT / OPSTARTFLOW
   ============================================================ */
function renderUserBar() {
  const sidebar = document.getElementById("sidebar");
  let bar = document.getElementById("userBar");
  if (bar) bar.remove();
  if (!SUPA_ON || !currentUser) return;
  bar = document.createElement("div");
  bar.id = "userBar";
  bar.style.cssText = "border-top:1px solid var(--border);margin-top:10px;padding-top:10px;font-size:.85rem;color:var(--muted);";
  let html = `Aangemeld als<br><strong style="color:var(--text);">${escapeHtml(currentUser.email)}</strong>`;
  if (isLeerkracht()) {
    html += `<button class="btn secondary" style="width:100%;margin-top:8px;" onclick="openDashboard()">Leerkracht-dashboard</button>`;
    html += `<button class="btn secondary" style="width:100%;margin-top:6px;" onclick="openCursus()">Terug naar cursus</button>`;
  }
  html += `<button class="btn secondary" style="width:100%;margin-top:6px;" onclick="signOut()">Afmelden</button>`;
  bar.innerHTML = html;
  sidebar.appendChild(bar);
}

function openDashboard() { document.getElementById("sidebar").classList.remove("hidden"); renderDashboard(); }
function openCursus() { renderModule(); renderNav(); renderUserBar(); }

async function startCursus() {
  document.getElementById("sidebar").classList.remove("hidden");
  await loadFromDb();
  renderNav();
  if (isLeerkracht()) { renderDashboard(); }
  else { renderModule(); }
  renderUserBar();
  updateProgress();
}

async function boot() {
  load(); // lokale fallback eerst
  if (!SUPA_ON) {
    // Geen Supabase ingesteld: cursus werkt lokaal, zonder login
    renderNav(); renderModule(); updateProgress();
    return;
  }
  initSupabase();
  // Reageer op terugkeer via magic link
  sb.auth.onAuthStateChange(async (_event, session) => {
    if (session && session.user) {
      currentUser = session.user;
      // schoon de tokens uit de URL
      if (window.location.hash.includes("access_token")) {
        history.replaceState(null, "", window.location.pathname + window.location.search);
      }
      await startCursus();
    }
  });
  currentUser = await checkSession();
  if (currentUser) { await startCursus(); }
  else { renderLogin(); }
}

boot();
</script>
